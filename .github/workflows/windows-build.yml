name: Build Windows Portable App

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine build version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
          } else {
            $version = "dev-${{ github.run_number }}"
          }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Build version: $version"

      - name: Build portable ZIP
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\build_windows_exe.ps1 -Version "${env:VERSION}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: EPUMapperReview_portable_${{ env.VERSION }}
          path: dist/EPUMapperReview_portable_${{ env.VERSION }}.zip
          if-no-files-found: error

      - name: Publish ZIP to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $asset = "dist\EPUMapperReview_portable_${env:VERSION}.zip"
          gh release create "${env:VERSION}" $asset --title "${env:VERSION}" --notes "Automated Windows portable build." 2>$null
          gh release upload "${env:VERSION}" $asset --clobber
